# Blueprint Render: New > Blueprint > conecta este repo.
# Si el plan "free" de Postgres no está disponible en tu cuenta, crea la BD
# desde el dashboard y enlaza DATABASE_URL al servicio web a mano.

databases:
  - name: votify-db
    databaseName: votify
    user: votify
    plan: free

services:
  - type: web
    name: votify-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: votify-db
          property: connectionString
