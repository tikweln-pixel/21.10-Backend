server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Local: sin DATABASE_URL. Render/Railway: DATABASE_URL=postgres://... (ver PostgresUrlDataSourceConfiguration)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.bmulgijtddwdwaajktay}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:19VX5FTtdniXvkho}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Necesario para Transaction Pooler (pgBouncer): deshabilita prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Actuator: GET http://localhost:8080/actuator/health
management.endpoints.web.exposure.include=health,info

# ── Test de Categorías ───────────────────────────────────────────────────
# Cambia a true para ejecutar el runner de prueba al arrancar la aplicación
votify.test.category=false
 