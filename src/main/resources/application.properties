server.port=${PORT:8080}

# Local: sin DATABASE_URL. Render/Railway: DATABASE_URL=postgres://... (ver PostgresUrlDataSourceConfiguration)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/votify}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Actuator: GET http://localhost:8080/actuator/health
management.endpoints.web.exposure.include=health,info

# ── Test de Categorías ───────────────────────────────────────────────────
# Cambia a true para ejecutar el runner de prueba al arrancar la aplicación
votify.test.category=false
 